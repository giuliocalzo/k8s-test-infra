name: helm Publish

permissions: {}

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'deployments/nvml-mock/helm/**'
      - '.github/workflows/helm-publish.yaml'

env:
  CHART_NAME: nvml-mock
  CHART_DIR: deployments/nvml-mock/helm

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # needed for keyless cosign signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Read chart version
        id: chart
        run: |
          version=$(helm show chart ${{ env.CHART_DIR }}/${{ env.CHART_NAME }} | grep '^version:' | awk '{print $2}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package ${{ env.CHART_DIR }}/${{ env.CHART_NAME }} --destination .cr-release-packages

      - name: Push chart to OCI registry
        run: helm push .cr-release-packages/${{ env.CHART_NAME }}-${{ steps.chart.outputs.version }}.tgz oci://ghcr.io/nvidia/k8s-test-infra/chart

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign OCI artifact
        run: |
          cosign sign --yes \
            ghcr.io/nvidia/k8s-test-infra/chart/${{ env.CHART_NAME }}:${{ steps.chart.outputs.version }}
